<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Пятница - Генератор Изображений</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #121212;
            color: #ffffff;
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
        }
        .container {
            background-color: #1e1e1e;
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.5);
            width: 100%;
            max-width: 600px;
        }
        h1 {
            text-align: center;
            color: #4CAF50;
            margin-top: 0;
        }
        textarea {
            width: 100%;
            padding: 12px;
            background-color: #2c2c2c;
            border: 1px solid #444;
            color: white;
            border-radius: 8px;
            font-size: 16px;
            resize: vertical;
            min-height: 100px;
            box-sizing: border-box;
            margin-bottom: 15px;
        }
        textarea:focus {
            outline: none;
            border-color: #4CAF50;
        }
        button {
            width: 100%;
            padding: 12px;
            background-color: #4CAF50;
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            cursor: pointer;
            transition: background-color 0.3s;
        }
        button:hover {
            background-color: #45a049;
        }
        button:disabled {
            background-color: #555;
            cursor: not-allowed;
        }
        #result-container {
            margin-top: 20px;
            text-align: center;
            display: none;
        }
        #generated-image {
            max-width: 100%;
            border-radius: 8px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.3);
        }
        #loader {
            display: none;
            text-align: center;
            margin-top: 20px;
            color: #aaa;
        }
        #error-msg {
            color: #ff5252;
            margin-top: 15px;
            text-align: center;
            display: none;
        }
    </style>
</head>
<body>

    <div class="container">
        <h1>Генерация Фото</h1>
        <textarea id="prompt" placeholder="Опишите, что вы хотите нарисовать... (например: Киберпанк город в неоновых лучах)"></textarea>
        <button id="generate-btn" onclick="generateImage()">Сгенерировать</button>
        
        <div id="loader">Пятница рисует, подождите... Это может занять до 20 секунд.</div>
        <div id="error-msg"></div>

        <div id="result-container">
            <img id="generated-image" src="" alt="Сгенерированное изображение">
        </div>
    </div>

    <script>
        async function generateImage() {
            const prompt = document.getElementById('prompt').value.trim();
            const btn = document.getElementById('generate-btn');
            const loader = document.getElementById('loader');
            const resultContainer = document.getElementById('result-container');
            const imgElement = document.getElementById('generated-image');
            const errorMsg = document.getElementById('error-msg');

            if (!prompt) {
                alert("Пожалуйста, введите описание!");
                return;
            }

            // UI states
            btn.disabled = true;
            loader.style.display = 'block';
            resultContainer.style.display = 'none';
            errorMsg.style.display = 'none';
            imgElement.src = "";

            try {
                const response = await fetch('/api/generate_image', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({ prompt: prompt })
                });

                const data = await response.json();

                if (response.ok && data.status === 'success') {
                    // Вставляем base64 строку в атрибут src
                    imgElement.src = "data:image/jpeg;base64," + data.image_base64;
                    resultContainer.style.display = 'block';
                } else {
                    throw new Error(data.message || "Неизвестная ошибка сервера");
                }
            } catch (error) {
                errorMsg.innerText = "Ошибка: " + error.message;
                errorMsg.style.display = 'block';
            } finally {
                btn.disabled = false;
                loader.style.display = 'none';
            }
        }
    </script>
</body>
</html>
